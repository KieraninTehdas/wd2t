{% extends "base.html" %}
{% block title %}A Great Decision{% endblock %}
{% block content %}
    <h1> {{ decision.title }} </h1>
    <p> {{ decision.description }} </p>
    <ul>
        {% for tag in decision.tags %}
        <li> {{ tag.key }}:{{ tag.value }} </li>
        {% endfor %}
    </ul

<p><a href={{ url_for("render_decisions") }}> Back To Decisions </a></p>
{% endblock %}
