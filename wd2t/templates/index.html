{% extends "base.html" %}
{% block title %}Decisions{% endblock %}
{% block content %}
    <h1>Decisions<h1>
    <p> <a href={{ url_for("render_new_decision_form") }}> We made a new decision <a/> </p>
    <ul>
    {% for decision in decisions %}
      <li> <a href={{ url_for("render_decision", decision_id=decision.id) }}> {{ decision.title }} </a> </li>
    {% endfor %}
{% endblock %}
