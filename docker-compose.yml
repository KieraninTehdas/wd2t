version: "3.7"
services:
  mongo:
    #    container_name: mongodb
    image: mongo:4.2.8
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: whatevs
    command: [--auth]
    ports:
      - 27017:27017
    volumes:
      - ./mongo-init-scripts:/docker-entrypoint-initdb.d/
  mongo-express:
    #    container_name: mongo-express
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: whatevs
    depends_on:
      - mongo
volumes:
  mongo-init-scripts:
